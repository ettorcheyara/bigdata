version: '3.8'

services:
  mongo1:
    image: mongo:latest
    container_name: mongo1
    ports:
      - "27017:27017"
    volumes:
      - mongo1-data:/data/db
    command: mongod --replSet rs0 --bind_ip_all

  mongo2:
    image: mongo:latest
    container_name: mongo2
    ports:
      - "27018:27017"
    volumes:
      - mongo2-data:/data/db
    command: mongod --replSet rs0 --bind_ip_all

  mongo3:
    image: mongo:latest
    container_name: mongo3
    ports:
      - "27019:27017"
    volumes:
      - mongo3-data:/data/db
    command: mongod --replSet rs0 --bind_ip_all

  python-app:
    image: python:3.11
    container_name: python-app
    ports:
      - "8501:8501"
    volumes:
      - ./mongodb:/app/mongodb
      - ./data-generator:/app/data-generator
      - ./visualisation:/app/visualisation

    depends_on:
      - mongo1
      - mongo2
      - mongo3
    working_dir: /app
    command: tail -f /dev/null

  spark-master:
   image: apache/spark:3.5.3
   container_name: spark-master
   ports:
    - "8081:8080"
   environment:
    - SPARK_MASTER_HOST=spark-master
    - JAVA_OPTS=-Divy.home=/home/spark/.ivy2
   volumes:
    - ./spark:/app/spark         
    - ./ivy2:/home/spark/.ivy2
   command: >
    /bin/bash -c "
    /opt/spark/sbin/start-master.sh &&
    tail -f /dev/null
    "

  spark-worker:
   image: apache/spark:3.5.3
   container_name: spark-worker
   depends_on:
    - spark-master
   environment:
    - SPARK_MASTER_URL=spark://spark-master:7077
    - JAVA_OPTS=-Divy.home=/home/spark/.ivy2
   volumes:
    - ./spark:/app/spark        
    - ./ivy2:/home/spark/.ivy2
   command: >
    /bin/bash -c "
    /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
    tail -f /dev/null
    "
  spark-worker2:
   image: apache/spark:3.5.3
   container_name: spark-worker2
   depends_on:
    - spark-master
   environment:
     - SPARK_MASTER_URL=spark://spark-master:7077
     - JAVA_OPTS=-Divy.home=/home/spark/.ivy2
   volumes:
     - ./spark:/app/spark
     - ./ivy2:/home/spark/.ivy2
   command: >
        /bin/bash -c "
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
        tail -f /dev/null
        "

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  spark:
  ivy2:
